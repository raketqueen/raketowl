<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Activity Logs</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Orbitron Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* THEME */
        body.light-mode {
            background-color: #f8f9fa;
            color: #000;
        }

        body.dark-mode {
            background-color: #121212;
            color: #fff;
        }

        /* HEADER */
        .main-title {
            font-family: 'Orbitron', san-serif;
            font-size: 48px;
            color: #00f5d4;
            text-align: center;
            margin-top: 20px;
            text-shadow: 0 0 8px #00fdd4;
        }

        /* TABLE */
        .table-dark-custom {
            background-color: #181818;
            color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
        }

        .table-dark-custom thead {
            background-color: #000000;
        }

        .table-dark-custom th {
            color: #ff2bd6;
            background-color: #000000;
        }

        .table-dark-custom tbody tr {
            background-color: #1e1e1e;
            color: #ffffff;
        }

        .table-dark-custom tbody tr:hover {
            background-color: #2a2a2a;
        }

        .btn-custom {
            margin: 5px;
        }

        .center {
            text-align: center;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- TITLE -->
    <h1 class="main-title">Activity Logs</h1>

    <!-- NAV -->
    <div class="d-flex justify-content-center mt-3">
        <a href="/" class="btn btn-primary btn-custom">← Main Page</a>
    </div>

    <!-- TABLE -->
    <div class="mt-4">
        <table class="table table-dark-custom table-hover">
            <thead>
                <tr>
                    <th>User</th>
                    <th>Action</th>
                    <th>Details</th>
                    <th>Timestamp</th>
                </tr>
            </thead>

            <tbody>
                {% if logs %}
                    {% for log in logs %}
                    <tr>
                        <td>{{ log.username }}</td>
                        <td>{{ log.action }}</td>
                        <td>{{ log.details }}</td>
                        <td>{{ log.timestamp }}</td>
                    </tr>
                    {% endfor %}
                {% else %}
                    <tr>
                        <td colspan="4" class="center">No activity found</td>
                    </tr>
                {% endif %}
            </tbody>

        </table>
    </div>

</div>

<!-- THEME SYNC -->
<script>
    window.onload = function () {
        let theme = localStorage.getItem("theme") || "dark";
        document.body.classList.add(theme + "-mode");
    };
</script>

</body>
</html>
