<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit User</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Orbitron Font -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* =========================
           THEME SYSTEM
        ========================= */
        body.light-mode {
            background-color: #f8f9fa;
            color: #000;
        }

        body.dark-mode {
            background-color: #121212;
            color: #fff;
        }

        /* HEADER */
        .main-title {
            font-family: 'Orbitron', san-serif;
            font-size: 48px;
            color: #00f5d4;
            text-align: center;
            margin-top: 20px;
            text-shadow: 0 0 8px #00fdd4;
        }

        /* FORM CONTAINER */
        .form-container {
            max-width: 700px;
            margin: auto;
            margin-top: 40px;
            padding: 25px;
            border-radius: 12px;
            background-color: #1e1e1e;
        }

        body.light-mode .form-container {
            background-color: #ffffff;
        }

        /* INPUT DARK MODE */
        body.dark-mode input,
        body.dark-mode select {
            background-color: #1e1e1e;
            color: #ffffff;
            border: 1px solid #444;
        }

        /* BUTTONS */
        .btn-custom {
            margin: 5px;
        }

        .center {
            text-align: center;
        }

        /* FORM LABEL STYLING */
        .form-container label {
            color: #4169e1; /* royal blue */
            font-weight: bold;
        }

        /* New Password → neon pink */
        body.dark-mode .form-container label.password-label {
            text-shadow: 
                0 0 5px  #ff2bd6,
                0 0 10px  #ff2bd6,
                0 0 20px  #ff2bd6;
            
        }

        /* Selected group highlight */
        body.dark-mode select option:checked {
            background-color: #ffc107; /* yellow */
            color: #000;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- TITLE -->
    <h1 class="main-title">Edit User</h1>

    <!-- NAVIGATION -->
    <div class="d-flex justify-content-center mt-3">
        <a href="/admin/users" class="btn btn-primary btn-custom">← User Management</a>
    </div>

    <!-- FORM -->
    <div class="form-container">

        <form method="POST" class="d-flex flex-column gap-3">

            <!-- Username -->
            <div>
                <label>Username</label>
                <input type="text" name="username" value="{{ user.username }}" class="form-control" required>
            </div>

            <!-- Role -->
            <div>
                <label>Role</label>
                <select name="role" class="form-select">
                    <option value="editor" {% if user.role == 'editor' %}selected{% endif %}>Editor</option>
                    <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
                </select>
            </div>

            <!-- Groups -->
            <div>
                <label>Groups</label>
                <select name="groups" multiple class="form-select" style="height: 120px;">
                    {% for g in groups %}
                        <option value="{{ g.id }}" {% if g.id in user_group_ids %}selected{% endif %}>
                            {{ g.name }}
                        </option>
                    {% endfor %}
                </select>
            </div>

	    <!-- RESET PASSWORD -->
	    <div>
    		<label class="password-label">New Password (leave blank to keep current)</label>
    		<input type="password" name="password" class="form-control">
	    </div>

            <!-- ACTION BUTTONS -->
            <div class="center mt-3">
                <button type="submit" class="btn btn-primary btn-custom">Save Changes</button>
                <a href="/admin/users" class="btn btn-info btn-custom">Cancel</a>
            </div>

        </form>

    </div>

</div>

<!-- =========================
     THEME SYNC (NO TOGGLE)
========================= -->
<script>
    window.onload = function () {
        let theme = localStorage.getItem("theme") || "dark";
        document.body.classList.add(theme + "-mode");
    };
</script>

</body>
</html>
