services:

  db:
    image: mysql:8.0
    container_name: raketowl_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ThunderKats1973
      MYSQL_DATABASE: raketowl
      TZ: "Asia/Singapore"
    command: --default-time-zone=+08:00
    volumes:
      - /dockers/raketowl/mysql:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "3307:3306"

  web:
    build: ./app
    container_name: raketowl_web
    restart: always
    depends_on:
      - db
    environment:
      - FLASK_ENV=development
      - TZ=Asia/Singapore
    volumes:
      - ./app:/app
      - /dockers/raketowl/documents:/documents
    ports:
      - "5000:5000"
    command: flask run --host=0.0.0.0 --port=5000 --reload

  nginx:
    build: ./nginx
    container_name: raketowl_nginx
    restart: always
    depends_on:
      - web
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/413.html:/usr/share/nginx/html/413.html
